  <script>

  function lockScroll() {
    document.body.style.overflow = 'hidden';
  }
  // Fonction pour libérer le scroll
  function unlockScroll() {
    document.body.style.overflow = '';
  }
  // 1. On attache l'événement à TOUS les boutons qui ont la classe 'trigger-contact'
  const openButtons = document.querySelectorAll('.trigger-contact');
  openButtons.forEach(btn => {
    btn.addEventListener('click', lockScroll);
  });
  // 2. On débloque quand on clique sur la croix
  const closeBtn = document.getElementById('btn-close-popup');
  if (closeBtn) {
    closeBtn.addEventListener('click', unlockScroll);
  }
  // 3. On débloque quand on clique sur le fond sombre (si applicable)
  const overlay = document.getElementById('modal-overlay');
  if (overlay) {
    overlay.addEventListener('click', unlockScroll);
  }
});

  <script>
// S'assure que le DOM est prêt
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('copyLinkBtn');
  if (!btn) return;                  // Sécurité : le bouton n'existe pas
  btn.addEventListener('click', async (e) => {
    e.preventDefault();              // Évite un scroll en haut si c'est un lien
    const url = window.location.href;
    try {
      // Méthode moderne (Chrome 66+, Firefox 63+, Edge & Safari 15+)
      await navigator.clipboard.writeText(url);
      showFeedback('Lien copié !');
    } catch (err) {
      // Fallback pour Safari < 15 ou si l’API est bloquée
      const textarea = document.createElement('textarea');
      textarea.value = url;
      textarea.style.position = 'fixed';   // Empêche un scroll
      textarea.style.top = '-1000px';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showFeedback('Lien copié !');
      } catch (err2) {
        alert('Impossible de copier : ' + err2);
      }
      document.body.removeChild(textarea);
    }
  });
  // Petit helper pour informer l’utilisateur
  function showFeedback(message) {
    const original = btn.textContent;
    btn.textContent = message;
    setTimeout(() => btn.textContent = original, 2000);
  }
});
</script>
